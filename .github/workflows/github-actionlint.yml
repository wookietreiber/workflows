---

name: actionlint

on:
  pull_request:
    paths:
      - .github/workflows/*.yml
  push:
    paths:
      - .github/workflows/*.yml
  workflow_call:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        uses: docker://rhysd/actionlint:1.7.11
        with:
          args: -color -verbose

...
