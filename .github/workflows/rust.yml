---

name: rust

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  CARGO_TERM_VERBOSE: true

jobs:

  check:
    name: cargo fmt --check and clippy
    runs-on: ubuntu-latest

    steps:

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: set up rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          components: clippy, rustfmt
          rustflags: ''

      - name: check formatting
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy

  msrv:
    name: msrv
    runs-on: ubuntu-latest

    outputs:
      msrv: ${{ steps.msrv.outputs.msrv }}

    steps:

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: install cargo-msrv
        uses: taiki-e/install-action@80a23c5ba9e1100fd8b777106e810018ed662a7b # v2.69.12
        with:
          tool: cargo-msrv

      - name: show cargo-msrv version
        run: cargo msrv --version

      - name: get msrv
        run: |
          msrv=$(cargo msrv show --output-format minimal)
          echo "msrv=$msrv" >> "$GITHUB_OUTPUT"
        id: msrv

      - name: show msrv
        run: echo ${{ steps.msrv.outputs.msrv }}

  test:
    name: cargo check, build and test
    runs-on: ubuntu-latest
    needs: msrv

    strategy:
      matrix:
        toolchain:
          - null # this will use rust-toolchain.toml
          - ${{ needs.msrv.outputs.msrv }}

    steps:

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: set up rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: cargo check
        run: cargo check

      - name: cargo build
        run: cargo build

      - name: cargo test
        run: cargo test

...
